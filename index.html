<audio id="music" src="./music.mp3" loop preload="auto" playsinline></audio>

<button class="music-btn" id="musicBtn" type="button">♫</button>

<div class="intro" id="intro">

  <div class="envelope" id="envelope">

    <div class="notch"></div>

    <div class="env-content">

      <div class="date-big">06</div>
      <div class="dot">•</div>

      <div class="date-big">06</div>
      <div class="dot">•</div>

      <div class="date-big">26</div>

      <div class="invite-word">
        DAVETLİSİNİZ
      </div>

      <div class="heart">♥</div>

      <div class="tap">
        AÇMAK İÇİN<br>
        DOKUNUN
      </div>

      <div class="arrow"></div>

    </div>

  </div>

</div>

<script>

const intro = document.getElementById("intro");
const envelope = document.getElementById("envelope");
const site = document.getElementById("site");

const music = document.getElementById("music");
const musicBtn = document.getElementById("musicBtn");

music.volume = 0.8;

let opened = false;

/* MUSIC */

async function startMusic(){

  try{

    music.muted = false;

    await music.play();

    musicBtn.innerHTML = "❚❚";

  }catch(error){

    console.log("Müzik çalışmadı:", error);

    musicBtn.innerHTML = "♫";

  }

}

async function toggleMusic(e){

  e.stopPropagation();

  if(music.paused){

    await startMusic();

  }else{

    music.pause();

    musicBtn.innerHTML = "♫";

  }

}

musicBtn.addEventListener("click", toggleMusic);

/* OPEN */

async function openInvitation(){

  if(opened) return;

  opened = true;

  await startMusic();

  envelope.style.transition = "1s ease";
  envelope.style.transform = "scale(.98)";
  envelope.style.opacity = "0";

  setTimeout(() => {

    intro.classList.add("hide");

  },700);

  setTimeout(() => {

    intro.style.display = "none";

    site.classList.add("show");

    window.scrollTo(0,0);

  },1500);

}

envelope.addEventListener("click", openInvitation);

envelope.addEventListener(
  "touchstart",
  openInvitation,
  { once:true }
);

</script>
